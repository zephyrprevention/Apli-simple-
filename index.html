<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Art de Vivre — Caisse</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Art de Vivre">
<meta name="theme-color" content="#2f4a3e">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --marais:#2f4a3e;
  --marais-clair:#3d6152;
  --sauge:#7d9a85;
  --lin:#f6f1e7;
  --lin-pur:#fdfbf6;
  --terre:#b8794a;
  --or:#c8a24a;
  --rouge:#b3433b;
  --encre:#23302a;
  --gris:#6b7670;
  --ligne:#e4ddcf;
  --ombre:0 1px 3px rgba(35,48,42,.08),0 6px 24px rgba(35,48,42,.06);
  --r:14px; --r-sm:9px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--lin);color:var(--encre);
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
  padding-bottom:calc(96px + env(safe-area-inset-bottom));
}
h1,h2{font-family:'Cormorant Garamond',serif;font-weight:600;color:var(--marais);}

header{
  background:var(--marais);color:#dfe7e0;
  padding:calc(14px + env(safe-area-inset-top)) 18px 16px;
  text-align:center;position:relative;
}
header h1{color:#fdfbf6;font-size:26px;letter-spacing:.5px;}
header .sous{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--sauge);margin-top:2px;}
.date-jour{
  display:inline-block;margin-top:10px;padding:4px 14px;border-radius:99px;
  background:rgba(255,255,255,.1);font-size:13px;color:#e9efe9;
}
.etat{
  position:absolute;top:calc(16px + env(safe-area-inset-top));right:16px;
  display:flex;align-items:center;gap:6px;font-size:11px;color:var(--sauge);
}
.etat .led{width:8px;height:8px;border-radius:50%;background:#8a9a90;transition:background .3s;}
.etat.ok .led{background:#6fbf73;box-shadow:0 0 6px rgba(111,191,115,.7);}
.etat.hors .led{background:var(--terre);}

main{max-width:640px;margin:0 auto;padding:16px 12px 0;}
.chambre{
  background:var(--lin-pur);border:1px solid var(--ligne);border-radius:var(--r);
  box-shadow:var(--ombre);margin-bottom:18px;overflow:hidden;
}
.chambre-tete{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;border-bottom:1px solid var(--ligne);
  background:linear-gradient(to bottom,#faf6ec,var(--lin-pur));
}
.chambre-tete h2{font-size:22px;}
.chambre-tete .pastille{width:10px;height:10px;border-radius:50%;flex:none;margin-right:10px;}
.chambre-tete .gauche{display:flex;align-items:center;}
.chambre-tete .droite{display:flex;align-items:center;gap:10px;}
.soustotal{font-size:15px;font-weight:600;color:var(--marais);font-variant-numeric:tabular-nums;}
.part-ch{
  border:1px solid var(--ligne);background:#fff;border-radius:99px;
  color:var(--marais-clair);font-size:12px;font-weight:600;font-family:inherit;
  padding:5px 11px;cursor:pointer;white-space:nowrap;
}
.part-ch:active{background:#efe9db;}

.entetes{
  display:grid;grid-template-columns:70px 84px 1fr 32px;gap:8px;
  padding:8px 12px 2px;font-size:10.5px;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;color:var(--gris);
}
.lignes{padding:0 12px 4px;}
.ligne{
  padding:8px 0 8px 9px;border-bottom:1px dashed var(--ligne);
  border-left:4px solid var(--jour, transparent);
  background:var(--jour-fond, transparent);
  border-radius:0 8px 8px 0;margin-bottom:2px;
  transition:background .2s;
}
.ligne:last-child{border-bottom:none;}
.ligne .haut{display:grid;grid-template-columns:64px 1fr;gap:8px;align-items:center;}
.ligne .bas{
  display:grid;grid-template-columns:70px 84px 1fr 32px;gap:8px;
  align-items:center;margin-top:6px;
}
.ligne input.texte{width:100%;}
.ligne input.date{
  text-align:center;font-size:13px;padding:9px 2px;
  font-weight:700;background:#fff;
  color:var(--jour, var(--marais-clair));
  border-color:var(--jour, var(--ligne));
}
.ligne input{
  border:1px solid var(--ligne);border-radius:var(--r-sm);
  background:#fff;padding:9px 8px;font-size:15px;min-width:0;width:100%;
  font-family:inherit;color:inherit;
}
.ligne input:focus{outline:none;border-color:var(--sauge);box-shadow:0 0 0 3px rgba(125,154,133,.18);}
.ligne input.qte,.ligne input.tarif{text-align:right;font-variant-numeric:tabular-nums;}
.ligne .total{
  text-align:right;font-weight:600;font-variant-numeric:tabular-nums;
  color:var(--encre);font-size:15px;padding-right:2px;
}
.ligne .suppr{
  border:none;background:none;color:var(--gris);font-size:20px;line-height:1;
  padding:6px 4px;cursor:pointer;border-radius:6px;
}
.ligne .suppr:active{color:var(--rouge);background:rgba(179,67,59,.08);}
.ajouter{
  display:block;width:calc(100% - 24px);margin:6px 12px 14px;
  border:1.5px dashed var(--sauge);border-radius:var(--r-sm);background:none;
  color:var(--marais-clair);font-weight:600;font-size:14px;padding:10px;cursor:pointer;
  font-family:inherit;
}
.ajouter:active{background:rgba(125,154,133,.1);}

/* ---------- boutons tarifs ---------- */
.tarifs{
  display:flex;flex-wrap:wrap;gap:6px;padding:10px 12px 4px;
  border-top:1px solid var(--ligne);background:#faf7ef;
}
.tarifs button{
  border:1px solid var(--sauge);border-radius:99px;background:#fff;
  color:var(--marais);font-weight:600;font-size:13px;
  padding:8px 12px;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:5px;
}
.tarifs button:active{background:var(--marais);color:#fff;}
.tarifs button .px{
  font-size:11px;color:var(--terre);font-weight:700;font-variant-numeric:tabular-nums;
}
.tarifs button:active .px{color:var(--or);}
.tarifs .reglage{
  border-style:dashed;border-color:var(--ligne);color:var(--gris);font-weight:500;
}

/* ---------- panneau de réglage des tarifs ---------- */
.voile{
  position:fixed;inset:0;background:rgba(35,48,42,.55);z-index:100;
  display:flex;align-items:flex-end;justify-content:center;
}
.panneau{
  background:var(--lin-pur);width:100%;max-width:640px;
  border-radius:var(--r) var(--r) 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));
  max-height:86vh;overflow-y:auto;box-shadow:0 -8px 32px rgba(0,0,0,.3);
}
.panneau h2{font-size:22px;margin-bottom:4px;}
.panneau .aide{font-size:12.5px;color:var(--gris);margin-bottom:14px;}
.panneau .tarif-l{
  display:grid;grid-template-columns:1fr 84px 32px;gap:8px;margin-bottom:8px;align-items:center;
}
.panneau .tarif-l .suppr-t{
  border:none;background:none;color:var(--gris);font-size:20px;line-height:1;
  padding:6px 4px;cursor:pointer;border-radius:6px;font-family:inherit;
}
.panneau .tarif-l .suppr-t:active{color:var(--rouge);background:rgba(179,67,59,.08);}
.panneau .ajout-t{
  width:100%;margin-top:6px;border:1.5px dashed var(--sauge);border-radius:var(--r-sm);
  background:none;color:var(--marais-clair);font-weight:600;font-size:14px;
  padding:11px;cursor:pointer;font-family:inherit;
}
.panneau .ajout-t:active{background:rgba(125,154,133,.1);}
.panneau input{
  border:1px solid var(--ligne);border-radius:var(--r-sm);background:#fff;
  padding:10px 9px;font-size:15px;width:100%;font-family:inherit;color:inherit;
}
.panneau input:focus{outline:none;border-color:var(--sauge);box-shadow:0 0 0 3px rgba(125,154,133,.18);}
.panneau input.px{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
.panneau .fermer{
  width:100%;margin-top:14px;border:none;border-radius:var(--r-sm);
  background:var(--marais);color:#fdfbf6;font-weight:600;font-size:15px;
  padding:13px;cursor:pointer;font-family:inherit;
}
.outils-ch{
  display:flex;gap:8px;padding:0 12px 12px;
}
.outils-ch button{
  flex:1;border:1px solid var(--ligne);border-radius:var(--r-sm);
  background:#f4f0e4;color:var(--marais-clair);font-weight:600;font-size:12.5px;
  padding:8px;cursor:pointer;font-family:inherit;
}
.outils-ch button:active{background:#e9e2d2;}

.barre-total{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:var(--marais);color:#fdfbf6;
  padding:14px 18px calc(14px + env(safe-area-inset-bottom));
  display:flex;align-items:center;justify-content:space-between;
  box-shadow:0 -6px 24px rgba(35,48,42,.25);
}
.barre-total .libelle{font-family:'Cormorant Garamond',serif;font-size:20px;color:#dfe7e0;}
.barre-total .montant{font-size:26px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--or);}

.actions{display:flex;gap:10px;margin:4px 0 20px;}
.actions button{
  flex:1;border:1px solid var(--ligne);border-radius:var(--r-sm);
  background:var(--lin-pur);color:var(--marais);font-weight:600;font-size:14px;
  padding:11px;cursor:pointer;box-shadow:var(--ombre);font-family:inherit;
}
.actions button:active{background:#efe9db;}
.actions .danger{color:var(--rouge);}
.chargement{text-align:center;padding:40px 20px;color:var(--gris);font-size:14px;}

/* ---------- onglets ---------- */
.onglets{
  display:flex;gap:4px;justify-content:center;margin-top:12px;
  background:rgba(0,0,0,.18);border-radius:99px;padding:3px;
  max-width:260px;margin-left:auto;margin-right:auto;
}
.onglets button{
  flex:1;border:none;background:none;color:var(--sauge);
  font-family:inherit;font-weight:600;font-size:13.5px;
  padding:7px 4px;border-radius:99px;cursor:pointer;letter-spacing:.5px;
}
.onglets button.actif{background:var(--lin);color:var(--marais);}

/* ---------- appel de l'autre téléphone ---------- */
.sonner{
  position:absolute;left:16px;top:calc(14px + env(safe-area-inset-top));
  border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);
  color:#e9efe9;font-family:inherit;font-weight:600;font-size:12px;
  padding:6px 11px;border-radius:99px;cursor:pointer;
}
.sonner:active{background:var(--or);color:var(--marais);border-color:var(--or);}
.alerte{
  position:fixed;left:12px;right:12px;top:12px;z-index:200;
  background:var(--or);color:#2a2410;border-radius:var(--r);
  padding:14px 16px;font-weight:700;font-size:15px;text-align:center;
  box-shadow:0 6px 28px rgba(0,0,0,.3);
  animation:pulse .5s ease-in-out 6;
}
@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.03);}
}

/* ---------- planning ---------- */
#planning{max-width:640px;margin:0 auto;padding:14px 12px 0;}
.mois-nav{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.mois-nav button{
  border:1px solid var(--ligne);background:var(--lin-pur);color:var(--marais);
  border-radius:var(--r-sm);font-size:18px;line-height:1;padding:8px 14px;
  cursor:pointer;font-family:inherit;box-shadow:var(--ombre);
}
.mois-nav .titre{
  font-family:'Cormorant Garamond',serif;font-size:23px;color:var(--marais);
  font-weight:600;text-transform:capitalize;
}
.jours-ent{
  display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:3px;
}
.jours-ent span{
  text-align:center;font-size:10px;font-weight:700;letter-spacing:.5px;
  color:var(--gris);text-transform:uppercase;
}
.grille{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.case{
  background:var(--lin-pur);border:1px solid var(--ligne);border-radius:8px;
  min-height:54px;padding:3px 3px 4px;cursor:pointer;
  display:flex;flex-direction:column;justify-content:space-between;
}
.case:active{background:#efe9db;}
.case.hors{background:transparent;border-color:transparent;cursor:default;}
.case.auj{border-color:var(--marais);border-width:2px;}
.case .n{font-size:12px;font-weight:600;color:var(--encre);text-align:right;padding-right:2px;}
.case.hors .n{visibility:hidden;}
.case .bandes{display:flex;flex-direction:column;gap:2px;}
.case .bd{height:5px;border-radius:2px;background:#e9e3d5;}
.case.complet{background:#fdeceb;border-color:#e8b5b1;}
.legende{
  display:flex;flex-wrap:wrap;gap:12px;justify-content:center;
  margin:14px 0 8px;font-size:12px;color:var(--gris);
}
.legende span{display:flex;align-items:center;gap:5px;}
.legende i{width:16px;height:6px;border-radius:2px;display:inline-block;}

/* ---------- panneau du jour ---------- */
.panneau .jour-l{
  display:grid;grid-template-columns:14px 1fr auto;gap:9px;
  align-items:center;padding:9px 0;border-bottom:1px dashed var(--ligne);
}
.panneau .jour-l .pt{width:11px;height:11px;border-radius:50%;}
.panneau .jour-l .nm{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--marais);}
.panneau .jour-l .bascule{
  border:1px solid var(--ligne);border-radius:99px;background:#fff;
  font-family:inherit;font-weight:600;font-size:12.5px;padding:7px 13px;
  cursor:pointer;color:var(--gris);white-space:nowrap;
}
.panneau .jour-l .bascule.pris{background:var(--marais);color:#fdfbf6;border-color:var(--marais);}
.panneau .sej{
  margin-top:16px;padding-top:14px;border-top:1px solid var(--ligne);
}
.panneau .sej h3{font-family:'Cormorant Garamond',serif;font-size:19px;color:var(--marais);margin-bottom:8px;}
.panneau .sej .rang{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.panneau .sej label{font-size:11px;font-weight:600;color:var(--gris);text-transform:uppercase;letter-spacing:.5px;}
.panneau .sej select{
  border:1px solid var(--ligne);border-radius:var(--r-sm);background:#fff;
  padding:10px 9px;font-size:15px;width:100%;font-family:inherit;color:inherit;
}
.panneau .sej .valider{
  width:100%;border:none;border-radius:var(--r-sm);background:var(--terre);
  color:#fff;font-weight:600;font-size:14.5px;padding:12px;cursor:pointer;
  font-family:inherit;margin-top:4px;
}

/* ---------- zone d'impression (invisible à l'écran) ---------- */
#impression{display:none;}
@media print{
  body{background:#fff;padding:0;}
  header, main, .barre-total{display:none !important;}
  #impression{display:block;padding:0;color:#000;font-size:12pt;}
  #impression h1{font-family:'Cormorant Garamond',serif;font-size:26pt;margin-bottom:2mm;}
  #impression .ent{border-bottom:1.5pt solid #2f4a3e;padding-bottom:3mm;margin-bottom:6mm;}
  #impression .ent .lieu{font-size:10pt;letter-spacing:2pt;text-transform:uppercase;color:#555;}
  #impression .ent .jour{font-size:10pt;color:#555;margin-top:1mm;}
  #impression h2{font-family:'Cormorant Garamond',serif;font-size:16pt;margin:6mm 0 2mm;
    display:flex;justify-content:space-between;border-bottom:.5pt solid #999;padding-bottom:1mm;}
  #impression table{width:100%;border-collapse:collapse;font-size:10.5pt;}
  #impression th{text-align:left;font-size:8pt;text-transform:uppercase;letter-spacing:.5pt;
    color:#555;border-bottom:.5pt solid #ccc;padding:1mm 1mm;}
  #impression td{padding:1.2mm 1mm;border-bottom:.25pt dotted #ccc;vertical-align:top;}
  #impression .num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
  #impression .vide{font-style:italic;color:#777;font-size:9.5pt;padding:2mm 1mm;}
  #impression .general{
    margin-top:8mm;border-top:1.5pt solid #2f4a3e;padding-top:3mm;
    display:flex;justify-content:space-between;font-size:15pt;font-weight:700;
  }
  #impression .pied{margin-top:10mm;font-size:8pt;color:#777;text-align:center;}
  .chambre{break-inside:avoid;}
  @page{margin:14mm;}
}
@media (prefers-reduced-motion: reduce){*{transition:none!important;}}
</style>
</head>
<body>

<header>
  <div class="etat" id="etat"><span class="led"></span><span id="etatTxt">Liaison…</span></div>
  <h1>Art de Vivre</h1>
  <div class="sous">chez Fred &amp; Mel — Caisse</div>
  <div class="date-jour" id="dateJour"></div>
  <div class="onglets">
    <button id="ongCaisse" class="actif">Caisse</button>
    <button id="ongPlanning">Planning</button>
  </div>
  <button id="btnSonner" class="sonner">🔔 Appeler</button>
</header>

<div id="alerte" class="alerte" hidden></div>

<main id="app"><div class="chargement">Connexion à la caisse partagée…</div></main>
<div id="planning" hidden></div>

<div class="barre-total">
  <span class="libelle">Total général</span>
  <span class="montant" id="totalGeneral">0,00 €</span>
</div>

<div id="impression"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, remove, update, push, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB8P8QzuzQErc_lPQ6900RK-vtrc6nQSKU",
  authDomain: "art-de-vivre-6c94d.firebaseapp.com",
  databaseURL: "https://art-de-vivre-6c94d-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "art-de-vivre-6c94d",
  storageBucket: "art-de-vivre-6c94d.firebasestorage.app",
  messagingSenderId: "838349773052",
  appId: "1:838349773052:web:11c1f5c6c13b3fff571f79"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const CHAMBRES = [
  { id:'boheme',  nom:'La Bohème',     couleur:'#b8794a' },
  { id:'atelier', nom:'L\u2019Atelier', couleur:'#c8a24a' },
  { id:'refuge',  nom:'Le Refuge',     couleur:'#7d9a85' }
];

const racine = ref(db, 'caisse');
const racineTarifs = ref(db, 'tarifs');
let donnees = {};        // { chambreId: { ligneId: {date,texte,qte,tarif,ordre} } }
let tarifs = null;       // { id: {nom, prix, ordre} }
let premierRendu = true;

const TARIFS_DEFAUT = [
  { id:'soft',   nom:'Soft',              prix:'3'  },
  { id:'b25',    nom:'Bière 25 cl',       prix:'4'  },
  { id:'b50',    nom:'Bière 50 cl',       prix:'7'  },
  { id:'vinv',   nom:'Verre de vin',      prix:'5'  },
  { id:'vinb',   nom:'Bouteille de vin',  prix:'15' },
  { id:'menu',   nom:'Menu',              prix:'25' },
  { id:'supp',   nom:'Supplément',        prix:'15' }
];

/* ---------- outils ---------- */
const euros = n => n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' €';
const nombre = v => { const n = parseFloat(String(v ?? '').replace(',','.')); return isNaN(n) ? 0 : n; };
const totalLigne = l => nombre(l.qte) * nombre(l.tarif);

function lignesTriees(chId){
  const obj = donnees[chId] || {};
  return Object.entries(obj)
    .map(([id, l]) => ({ id, ...l }))
    .sort((a,b) => (a.ordre||0) - (b.ordre||0));
}
const totalChambre = chId => lignesTriees(chId).reduce((s,l)=>s+totalLigne(l),0);
const totalGeneral = () => CHAMBRES.reduce((s,c)=>s+totalChambre(c.id),0);

/* ---------- état de connexion ---------- */
onValue(ref(db, '.info/connected'), snap => {
  const el = document.getElementById('etat');
  const txt = document.getElementById('etatTxt');
  if(snap.val() === true){ el.className = 'etat ok';   txt.textContent = 'Synchronisé'; }
  else                   { el.className = 'etat hors'; txt.textContent = 'Hors ligne'; }
});

/* ---------- tarifs partagés entre les téléphones ---------- */
function tarifsTries(){
  if(!tarifs) return [];
  return Object.entries(tarifs)
    .map(([id, t]) => ({ id, ...t }))
    .sort((a,b) => (a.ordre||0) - (b.ordre||0));
}

let tarifsInitialises = false;

onValue(racineTarifs, snap => {
  tarifs = snap.val();
  // les tarifs par défaut ne sont créés qu'au tout premier lancement,
  // jamais après une suppression volontaire
  if(!tarifsInitialises && (!tarifs || !Object.keys(tarifs).length)){
    tarifsInitialises = true;
    const init = {};
    TARIFS_DEFAUT.forEach((t,i) => init[t.id] = { nom:t.nom, prix:t.prix, ordre:i });
    set(racineTarifs, init);
    return;
  }
  tarifsInitialises = true;
  if(!premierRendu) for(const c of CHAMBRES) rendreTarifs(c.id);
});

/* ---------- écoute temps réel ---------- */
onValue(racine, snap => {
  donnees = snap.val() || {};
  let besoinInit = false;
  for(const c of CHAMBRES){
    if(!donnees[c.id] || Object.keys(donnees[c.id]).length === 0) besoinInit = true;
  }
  if(premierRendu){
    construire();
    premierRendu = false;
  }
  for(const c of CHAMBRES) rendreLignes(c.id);
  majTotaux();
  if(besoinInit) for(const c of CHAMBRES){
    if(!donnees[c.id] || Object.keys(donnees[c.id]).length === 0) ajouterLigne(c.id);
  }
});

/* ---------- lignes (rendu incrémental, ne casse pas la saisie en cours) ---------- */
function rendreLignes(chId){
  const zone = document.getElementById('lignes-'+chId);
  if(!zone) return;
  const lignes = lignesTriees(chId);
  const vues = new Set();

  lignes.forEach(l => {
    vues.add(l.id);
    let div = zone.querySelector(`[data-id="${l.id}"]`);
    if(!div){
      div = creerLigne(chId, l.id);
      zone.appendChild(div);
    }
    majLigne(div, l);
  });

  // retirer les lignes supprimées ailleurs
  zone.querySelectorAll('.ligne').forEach(div => {
    if(!vues.has(div.dataset.id)) div.remove();
  });

  // remettre dans l'ordre — uniquement si l'ordre a réellement changé,
  // car déplacer un noeud dans le DOM ferme le clavier du téléphone
  const actuel = [...zone.querySelectorAll('.ligne')].map(d => d.dataset.id);
  const voulu  = lignes.map(l => l.id);
  if(actuel.join('|') !== voulu.join('|')){
    voulu.forEach(id => {
      const div = zone.querySelector(`[data-id="${id}"]`);
      if(div) zone.appendChild(div);
    });
  }
}

function creerLigne(chId, ligneId){
  const div = document.createElement('div');
  div.className = 'ligne';
  div.dataset.id = ligneId;
  div.innerHTML = `
    <div class="haut">
      <input type="text" class="date" inputmode="numeric" placeholder="jj/mm">
      <input type="text" class="texte" placeholder="Désignation — ex. Nuitée 2 pers.">
    </div>
    <div class="bas">
      <input type="text" inputmode="decimal" class="qte" placeholder="1">
      <input type="text" inputmode="decimal" class="tarif" placeholder="0,00">
      <span class="total">0,00 €</span>
      <button class="suppr" aria-label="Supprimer la ligne">×</button>
    </div>
  `;
  const chemin = ref(db, `caisse/${chId}/${ligneId}`);
  const champs = ['date','texte','qte','tarif'];
  champs.forEach(nom => {
    const inp = div.querySelector('.'+nom);
    inp.addEventListener('input', () => {
      // le clavier numérique de l'iPhone n'a pas de "/" : on l'insère nous-mêmes
      if(nom === 'date'){
        const f = formaterDate(inp.value);
        if(f !== inp.value) inp.value = f;
      }
      update(chemin, { [nom]: inp.value });
      const l = (donnees[chId] && donnees[chId][ligneId]) || {};
      div.querySelector('.total').textContent = euros(totalLigne({ ...l, [nom]: inp.value }));
    });
  });
  div.querySelector('.suppr').addEventListener('click', () => remove(chemin));
  return div;
}

function majLigne(div, l){
  ['date','texte','qte','tarif'].forEach(nom => {
    const inp = div.querySelector('.'+nom);
    const val = l[nom] ?? '';
    // ne jamais écraser un champ en cours de frappe sur ce téléphone
    if(document.activeElement !== inp && inp.value !== val) inp.value = val;
  });
  div.querySelector('.total').textContent = euros(totalLigne(l));

  // liseré coloré : un jour = une couleur
  const c = couleurJour(l.date);
  if(c){
    div.style.setProperty('--jour', c);
    div.style.setProperty('--jour-fond', c + '12');
  }else{
    div.style.removeProperty('--jour');
    div.style.removeProperty('--jour-fond');
  }
}

function dateDuJour(){
  const d = new Date();
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}

function ajouterLigne(chId){
  const lignes = lignesTriees(chId);
  const derniere = lignes[lignes.length-1];
  const ordre = derniere ? (derniere.ordre || 0) + 1 : 0;
  // la date reprend celle de la ligne précédente, sinon celle du jour :
  // aucune saisie n'est nécessaire dans l'usage courant
  const date = derniere && derniere.date ? derniere.date : dateDuJour();
  push(ref(db, 'caisse/'+chId), { date, texte:'', qte:'', tarif:'', ordre });
}

/* ---------- ajout rapide par bouton tarif ---------- */
function rendreTarifs(chId){
  const zone = document.getElementById('tarifs-'+chId);
  if(!zone) return;
  const liste = tarifsTries().filter(t => (t.nom||'').trim());
  zone.innerHTML = '';
  liste.forEach(t => {
    const b = document.createElement('button');
    b.innerHTML = `${ech(t.nom)} <span class="px">${ech(t.prix)}€</span>`;
    b.addEventListener('click', () => ajoutRapide(chId, t));
    zone.appendChild(b);
  });
  const r = document.createElement('button');
  r.className = 'reglage';
  r.textContent = '⚙ Tarifs';
  r.addEventListener('click', ouvrirReglages);
  zone.appendChild(r);
}

function ajoutRapide(chId, t){
  const lignes = lignesTriees(chId);
  const derniere = lignes[lignes.length-1];
  const jour = derniere && derniere.date ? derniere.date : dateDuJour();

  // si la dernière ligne est déjà cet article au même jour, on incrémente
  // la quantité : appuyer 3 fois sur « Bière 25 » donne bien 3 bières
  if(derniere && derniere.texte === t.nom && (derniere.date||'') === jour
     && String(derniere.tarif) === String(t.prix)){
    const q = nombre(derniere.qte) || 0;
    update(ref(db, `caisse/${chId}/${derniere.id}`), { qte: String(q + 1) });
    return;
  }

  // sinon on crée une ligne, complète et datée
  const ordre = derniere ? (derniere.ordre || 0) + 1 : 0;
  push(ref(db, 'caisse/'+chId), {
    date: jour, texte: t.nom, qte: '1', tarif: String(t.prix), ordre
  });
}

/* ---------- couleurs par jour ---------- */
const PALETTE = [
  '#b8794a', // terre
  '#6b8fa3', // ardoise
  '#8a9a5b', // olive
  '#a4708a', // prune
  '#c8a24a', // or
  '#5f8f7e', // vert d'eau
  '#a86a5c'  // brique
];

// même jour = même couleur partout, quelle que soit la chambre
function tableauDesJours(){
  const jours = new Set();
  for(const c of CHAMBRES){
    lignesTriees(c.id).forEach(l => {
      const d = (l.date || '').trim();
      if(d) jours.add(d);
    });
  }
  return [...jours].sort(compareJours);
}

// tri jj/mm chronologique
function compareJours(a, b){
  const p = s => {
    const m = s.match(/^(\d{1,2})\/(\d{1,2})$/);
    return m ? Number(m[2]) * 100 + Number(m[1]) : 9999;
  };
  return p(a) - p(b);
}

function couleurJour(date){
  const d = (date || '').trim();
  if(!d) return null;
  const i = tableauDesJours().indexOf(d);
  return i < 0 ? null : PALETTE[i % PALETTE.length];
}

// transforme "1107" en "11/07" pendant la frappe
function formaterDate(v){
  let n = String(v).replace(/\D/g,'').slice(0,4);
  if(n.length >= 3) n = n.slice(0,2) + '/' + n.slice(2);
  return n;
}

/* ================= PLANNING ================= */
const racineResa = ref(db, 'resa');
let resa = {};           // { chambreId: { '2026-08-17': {nom:'…'} } }
let moisVu = new Date(); moisVu.setDate(1);

onValue(racineResa, snap => { resa = snap.val() || {}; rendrePlanning(); });

const cle = d => d.getFullYear() + '-' +
  String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');

const estPris = (chId, k) => !!(resa[chId] && resa[chId][k]);
const nomClient = (chId, k) => (resa[chId] && resa[chId][k] && resa[chId][k].nom) || '';

function rendrePlanning(){
  const zone = document.getElementById('planning');
  if(!zone || zone.hidden && !zone.dataset.pret) { if(!zone) return; }

  const an = moisVu.getFullYear(), mo = moisVu.getMonth();
  const titre = moisVu.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});

  // lundi = premier jour de la semaine
  const premier = new Date(an, mo, 1);
  let decal = premier.getDay() - 1; if(decal < 0) decal = 6;
  const nbJours = new Date(an, mo+1, 0).getDate();
  const auj = cle(new Date());

  let cases = '';
  for(let i = 0; i < decal; i++) cases += `<div class="case hors"><span class="n"></span></div>`;
  for(let j = 1; j <= nbJours; j++){
    const k = cle(new Date(an, mo, j));
    const pris = CHAMBRES.filter(c => estPris(c.id, k)).length;
    const bandes = CHAMBRES.map(c =>
      `<div class="bd" style="${estPris(c.id,k) ? 'background:'+c.couleur : ''}"></div>`
    ).join('');
    cases += `<div class="case ${pris === CHAMBRES.length ? 'complet' : ''} ${k === auj ? 'auj' : ''}"
                   data-k="${k}"><span class="n">${j}</span>
                <div class="bandes">${bandes}</div></div>`;
  }

  zone.innerHTML = `
    <div class="mois-nav">
      <button id="moisPrec">‹</button>
      <span class="titre">${titre}</span>
      <button id="moisSuiv">›</button>
    </div>
    <div class="jours-ent">
      <span>Lu</span><span>Ma</span><span>Me</span><span>Je</span>
      <span>Ve</span><span>Sa</span><span>Di</span>
    </div>
    <div class="grille">${cases}</div>
    <div class="legende">
      ${CHAMBRES.map(c => `<span><i style="background:${c.couleur}"></i>${ech(c.nom)}</span>`).join('')}
      <span><i style="background:#fdeceb;border:1px solid #e8b5b1"></i>Complet</span>
    </div>
  `;
  zone.dataset.pret = '1';

  zone.querySelector('#moisPrec').addEventListener('click', () => {
    moisVu = new Date(an, mo-1, 1); rendrePlanning();
  });
  zone.querySelector('#moisSuiv').addEventListener('click', () => {
    moisVu = new Date(an, mo+1, 1); rendrePlanning();
  });
  zone.querySelectorAll('.case[data-k]').forEach(el =>
    el.addEventListener('click', () => ouvrirJour(el.dataset.k))
  );
}

function ouvrirJour(k){
  const [a,m,j] = k.split('-').map(Number);
  const d = new Date(a, m-1, j);
  const libelle = d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});

  const voile = document.createElement('div');
  voile.className = 'voile';
  const p = document.createElement('div');
  p.className = 'panneau';
  p.innerHTML = `
    <h2 style="text-transform:capitalize">${ech(libelle)}</h2>
    <div class="aide">Appuyez sur une chambre pour la marquer occupée ou libre.
      Le nom du client est facultatif.</div>
    <div id="jourListe"></div>
    <div class="sej">
      <h3>Enregistrer un séjour</h3>
      <div class="rang">
        <div><label>Chambre</label>
          <select id="sejCh">${CHAMBRES.map(c=>`<option value="${c.id}">${ech(c.nom)}</option>`).join('')}</select>
        </div>
        <div><label>Client</label><input type="text" id="sejNom" placeholder="Nom"></div>
      </div>
      <div class="rang">
        <div><label>Arrivée</label><input type="date" id="sejDeb" value="${k}"></div>
        <div><label>Départ</label><input type="date" id="sejFin" value="${k}"></div>
      </div>
      <button class="valider" id="sejOk">Bloquer ces nuits</button>
    </div>
    <button class="fermer">Terminé</button>
  `;
  voile.appendChild(p);
  document.body.appendChild(voile);

  const liste = p.querySelector('#jourListe');
  CHAMBRES.forEach(c => {
    const l = document.createElement('div');
    l.className = 'jour-l';
    const pris = estPris(c.id, k);
    l.innerHTML = `
      <span class="pt" style="background:${c.couleur}"></span>
      <span class="nm">${ech(c.nom)}</span>
      <button class="bascule ${pris?'pris':''}">${pris ? 'Occupée' : 'Libre'}</button>
    `;
    const nomIn = document.createElement('input');
    nomIn.type = 'text'; nomIn.placeholder = 'Nom du client (facultatif)';
    nomIn.value = nomClient(c.id, k);
    nomIn.style.cssText = 'grid-column:2/4;margin-top:2px;' + (pris ? '' : 'display:none;');
    nomIn.addEventListener('input', () =>
      set(ref(db, `resa/${c.id}/${k}`), { nom: nomIn.value }));
    l.appendChild(nomIn);

    l.querySelector('.bascule').addEventListener('click', e => {
      const b = e.currentTarget;
      if(estPris(c.id, k)){
        remove(ref(db, `resa/${c.id}/${k}`));
        b.classList.remove('pris'); b.textContent = 'Libre';
        nomIn.style.display = 'none'; nomIn.value = '';
      }else{
        set(ref(db, `resa/${c.id}/${k}`), { nom: '' });
        b.classList.add('pris'); b.textContent = 'Occupée';
        nomIn.style.display = '';
      }
    });
    liste.appendChild(l);
  });

  p.querySelector('#sejOk').addEventListener('click', () => {
    const ch  = p.querySelector('#sejCh').value;
    const nom = p.querySelector('#sejNom').value;
    const deb = p.querySelector('#sejDeb').value;
    const fin = p.querySelector('#sejFin').value;
    if(!deb || !fin){ alert('Indiquez les dates d\'arrivée et de départ.'); return; }
    const d1 = new Date(deb + 'T12:00'), d2 = new Date(fin + 'T12:00');
    if(d2 < d1){ alert('Le départ doit suivre l\'arrivée.'); return; }
    // on bloque les nuits : de l'arrivée à la veille du départ
    const maj = {};
    let n = 0;
    for(let d = new Date(d1); d < d2 || (n === 0 && +d === +d2); d.setDate(d.getDate()+1)){
      maj[cle(d)] = { nom };
      n++;
      if(n > 370) break;
    }
    update(ref(db, 'resa/'+ch), maj);
    voile.remove();
  });

  const fermer = () => { voile.remove(); rendrePlanning(); };
  p.querySelector('.fermer').addEventListener('click', fermer);
  voile.addEventListener('click', e => { if(e.target === voile) fermer(); });
}

// l'iPhone n'autorise le son qu'après une action de l'utilisateur
function preparerAudio(){
  if(!audio){
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC) audio = new AC();
  }
  if(audio && audio.state === 'suspended') audio.resume();
}
document.addEventListener('touchstart', preparerAudio, { once:true });
document.addEventListener('click', preparerAudio, { once:true });

function carillon(){
  preparerAudio();
  if(!audio) return;
  // trois notes façon clochette d'accueil
  [0, .28, .56].forEach((t, i) => {
    const o = audio.createOscillator(), g = audio.createGain();
    o.type = 'sine';
    o.frequency.value = [880, 1174, 1568][i];
    const d = audio.currentTime + t;
    g.gain.setValueAtTime(0, d);
    g.gain.linearRampToValueAtTime(.35, d + .02);
    g.gain.exponentialRampToValueAtTime(.001, d + .5);
    o.connect(g); g.connect(audio.destination);
    o.start(d); o.stop(d + .55);
  });
  if(navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
}

  const p = snap.val();
  if(!p || !p.id) return;
  if(p.id === dernierPing) return;          // déjà traité
  dernierPing = p.id;
  if(!p.at || p.at < departPage) return;    // appel antérieur à l'ouverture
  if(p.de === monNomCache) return;          // c'est moi qui ai appelé
  carillon();
  afficherAlerte(p.de || 'Quelqu\'un');
});

document.getElementById('btnSonner').addEventListener('click', () => {
  monNomCache = monNom();
  preparerAudio();
  set(racinePing, {
    de: monNomCache,
    at: Date.now(),
    id: Math.random().toString(36).slice(2) + Date.now()
  });
  const b = document.getElementById('btnSonner');
  const t = b.textContent;
  b.textContent = '✓ Envoyé';
  setTimeout(() => { b.textContent = t; }, 1800);
});

/* ---------- partage ---------- */
function lignesUtiles(chId){
  return lignesTriees(chId).filter(l => (l.texte||'').trim() || nombre(l.qte) || nombre(l.tarif));
}

function partager(chId){
  const cibles = chId ? CHAMBRES.filter(c => c.id === chId) : CHAMBRES;
  const auj = new Date().toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'});
  const L = [];
  L.push('ART DE VIVRE — Récap caisse');
  L.push('Édité le ' + auj);
  L.push('');

  for(const c of cibles){
    const lignes = lignesUtiles(c.id);
    L.push('━━━━━━━━━━━━━━━━━━━━');
    L.push(c.nom.toUpperCase());
    if(!lignes.length){
      L.push('  (aucune consommation)');
    } else {
      lignes.forEach(l => {
        const d = (l.date||'').trim();
        L.push('  ' + (d ? d + ' · ' : '') + (l.texte || 'Sans libellé'));
        L.push('     ' + nombre(l.qte) + ' × ' + euros(nombre(l.tarif)) +
               '  =  ' + euros(totalLigne(l)));
      });
    }
    L.push('  ▸ Sous-total ' + c.nom + ' : ' + euros(totalChambre(c.id)));
    L.push('');
  }

  L.push('━━━━━━━━━━━━━━━━━━━━');
  if(chId){
    L.push('TOTAL ' + cibles[0].nom.toUpperCase() + ' : ' + euros(totalChambre(chId)));
  } else {
    CHAMBRES.forEach(c => L.push('  ' + c.nom + ' : ' + euros(totalChambre(c.id))));
    L.push('');
    L.push('TOTAL GÉNÉRAL : ' + euros(totalGeneral()));
  }

  const txt = L.join('\n');
  const titre = chId ? 'Art de Vivre — ' + cibles[0].nom : 'Art de Vivre — Récap';
  if(navigator.share) navigator.share({ title: titre, text: txt }).catch(()=>{});
  else navigator.clipboard.writeText(txt).then(()=>alert('Récap copié dans le presse-papier.'));
}

/* ---------- impression ---------- */
function imprimer(chId){
  const cibles = chId ? CHAMBRES.filter(c => c.id === chId) : CHAMBRES;
  const auj = new Date().toLocaleDateString('fr-FR',
    {weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let h = `
    <div class="ent">
      <h1>Art de Vivre</h1>
      <div class="lieu">chez Fred &amp; Mel — ${chId ? ech(cibles[0].nom) : 'Récapitulatif de caisse'}</div>
      <div class="jour">Édité le ${auj}</div>
    </div>`;

  for(const c of cibles){
    const lignes = lignesUtiles(c.id);
    h += `<h2><span>${ech(c.nom)}</span><span>${euros(totalChambre(c.id))}</span></h2>`;
    if(!lignes.length){
      h += `<div class="vide">Aucune consommation enregistrée.</div>`;
      continue;
    }
    h += `<table>
      <tr><th style="width:14%">Date</th><th>Désignation</th>
          <th class="num" style="width:10%">Qté</th>
          <th class="num" style="width:16%">Tarif</th>
          <th class="num" style="width:18%">Total</th></tr>`;
    lignes.forEach(l => {
      h += `<tr>
        <td>${ech(l.date || '')}</td>
        <td>${ech(l.texte || 'Sans libellé')}</td>
        <td class="num">${nombre(l.qte)}</td>
        <td class="num">${euros(nombre(l.tarif))}</td>
        <td class="num">${euros(totalLigne(l))}</td>
      </tr>`;
    });
    h += `</table>`;
  }

  const libelle = chId ? 'Total ' + ech(cibles[0].nom) : 'Total général';
  const montant = chId ? totalChambre(chId) : totalGeneral();
  h += `<div class="general"><span>${libelle}</span><span>${euros(montant)}</span></div>
        <div class="pied">Art de Vivre chez Fred &amp; Mel — Champagné-les-Marais</div>`;

  document.getElementById('impression').innerHTML = h;
  setTimeout(() => window.print(), 120);
}

function ech(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

document.getElementById('dateJour').textContent =
  new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
